<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Budget Buddy</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
            transition: 0.3s;
        }

        .dark {
            background: #121212;
            color: white;
        }

        .navbar {
            background: #4facfe;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            width: 80%;
            margin: auto;
            text-align: center;
            margin-top: 20px;
        }

        .cards {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 25%;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .dark .card {
            background: #1e1e1e;
        }

        .btn {
            background: #4facfe;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin: 10px;
            cursor: pointer;
        }

        select, input {
            padding: 8px;
            margin: 5px;
        }

        canvas {
            max-width: 400px;
            margin: auto;
        }

        footer {
            margin-top: 30px;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>💰 Budget Buddy</h2>
    <div>
        <button class="btn" onclick="toggleMode()">🌙 Mode</button>
        <a href="/logout" style="color:white;">Logout</a>
    </div>
</div>

<div class="container">

    <h2>Welcome, {{ username }} 👋</h2>

    <!-- CATEGORY INPUT -->
    <h3>Add Expense</h3>

    <select id="category">
        <option>Food</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Entertainment</option>
    </select>

    <input type="number" id="amount" placeholder="Enter Amount">
    <button class="btn" onclick="addExpense()">Add</button>

    <!-- PIE CHART -->
    <h3>Expense Chart</h3>
    <canvas id="chart"></canvas>

    <!-- HISTORY -->
    <h3>History</h3>
    <ul id="history"></ul>

</div>

<footer>
    <p>© 2026 Budget Buddy</p>
</footer>

<script>
let data = {
    Food: 0,
    Transport: 0,
    Shopping: 0,
    Entertainment: 0
};

let historyList = [];

let chart = new Chart(document.getElementById("chart"), {
    type: 'pie',
    data: {
        labels: Object.keys(data),
        datasets: [{
            data: Object.values(data)
        }]
    }
});

function addExpense() {
    let category = document.getElementById("category").value;
    let amount = parseInt(document.getElementById("amount").value);

    if (!amount) return;

    data[category] += amount;
    historyList.push(category + " - ₹" + amount);

    updateChart();
    updateHistory();
}

function updateChart() {
    chart.data.datasets[0].data = Object.values(data);
    chart.update();
}

function updateHistory() {
    let list = document.getElementById("history");
    list.innerHTML = "";

    historyList.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
    });
}

function toggleMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
