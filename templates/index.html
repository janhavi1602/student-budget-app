<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Budget Buddy</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
        }

        .navbar {
            background: #4facfe;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            width: 80%;
            margin: auto;
            text-align: center;
            margin-top: 20px;
        }

        .cards {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 25%;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .btn {
            background: #4facfe;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin: 10px;
            cursor: pointer;
        }

        footer {
            margin-top: 30px;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>💰 Budget Buddy</h2>
    <a href="/logout" style="color:white;">Logout</a>
</div>

<div class="container">

    <h2>Welcome to your Dashboard 👋</h2>

    <div class="cards">
        <div class="card">
            <h3>Total Income</h3>
            <p>₹5000</p>
        </div>

        <div class="card">
            <h3>Total Expense</h3>
            <p>₹3200</p>
        </div>

        <div class="card">
            <h3>Balance</h3>
            <p>₹1800</p>
        </div>
    </div>

    <br>

    <button class="btn">Add Income</button>
    <button class="btn">Add Expense</button>

    <br><br>

    <canvas id="chart"></canvas>

</div>

<footer>
    <p>© 2026 Budget Buddy | Mini Project</p>
</footer>

<script>
new Chart(document.getElementById("chart"), {
    type: 'pie',
    data: {
        labels: ['Food','Transport','Shopping','Entertainment'],
        datasets: [{
            data: [500,300,200,150]
        }]
    }
});
</script>

</body>
</html>
