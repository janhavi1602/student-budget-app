<!DOCTYPE html>
<html>
<head>
    <title>Monthly History</title>
    <style>
        body { font-family: Arial; margin: 20px; }

        table {
            width: 50%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #ccc;
            text-align: center;
        }

        .nav a {
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="/">Dashboard</a>
    <a href="/logout">Logout</a>
</div>

<h2>Monthly Expense History</h2>

<table>
    <tr>
        <th>Month</th>
        <th>Total Expense</th>
    </tr>

    {% for month, amount in monthly_data.items() %}
    <tr>
        <td>{{ month }}</td>
        <td>₹{{ amount }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
